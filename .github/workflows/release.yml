name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

env:
  GO_VERSION: '1.21'

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ''
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: ''
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: mcp-server-go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mcp-server-go/internal/services/ast_indexer_rust

      - name: Build Go server
        working-directory: mcp-server-go
        shell: bash
        run: |
          export GOOS='${{ matrix.os }}'
          export GOARCH='${{ matrix.arch }}'
          export CGO_ENABLED=0
          go build -o bin/mpm-go${{ matrix.ext }} ./cmd/server

      - name: Build Rust AST indexer
        working-directory: mcp-server-go/internal/services/ast_indexer_rust
        shell: bash
        run: |
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            windows-amd64)
              TARGET="x86_64-pc-windows-msvc"
              ;;
            linux-amd64)
              TARGET="x86_64-unknown-linux-gnu"
              ;;
            darwin-amd64)
              TARGET="x86_64-apple-darwin"
              ;;
            darwin-arm64)
              TARGET="aarch64-apple-darwin"
              ;;
            *)
              echo "Unsupported matrix target: ${{ matrix.os }}-${{ matrix.arch }}"
              exit 1
              ;;
          esac

          rustup target add "$TARGET"
          cargo build --release --target "$TARGET"
          cp "target/$TARGET/release/ast_indexer_rust${{ matrix.ext }}" "../../../bin/ast_indexer${{ matrix.ext }}"

      - name: Prepare release package
        shell: bash
        run: |
          mkdir -p release/mpm-${{ matrix.os }}-${{ matrix.arch }}
          cp mcp-server-go/bin/mpm-go${{ matrix.ext }} release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp mcp-server-go/bin/ast_indexer${{ matrix.ext }} release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp README.md release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp README_EN.md release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp QUICKSTART.md release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp QUICKSTART_EN.md release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp mcp-config-example.json release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp -r docs release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          rm -f release/mpm-${{ matrix.os }}-${{ matrix.arch }}/docs/DESIGN_task_chain_v3.md
          rm -f release/mpm-${{ matrix.os }}-${{ matrix.arch }}/docs/TASK_CHAIN_V3_FLOW.md
          cp -r opencode-agents release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          cp -r mcp-server-go/configs release/mpm-${{ matrix.os }}-${{ matrix.arch }}/
          
          if [ "${{ matrix.os }}" = "windows" ]; then
            cd release && 7z a mpm-${{ matrix.os }}-${{ matrix.arch }}.zip mpm-${{ matrix.os }}-${{ matrix.arch }}
          else
            cd release && tar -czvf mpm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz mpm-${{ matrix.os }}-${{ matrix.arch }}
          fi

      - name: Upload artifact (release package)
        uses: actions/upload-artifact@v4
        with:
          name: mpm-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            release/mpm-${{ matrix.os }}-${{ matrix.arch }}.zip
            release/mpm-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

      - name: Upload artifact (binaries for mcpb)
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            mcp-server-go/bin/mpm-go${{ matrix.ext }}
            mcp-server-go/bin/ast_indexer${{ matrix.ext }}
          retention-days: 1

  build-mcpb:
    name: Build MCPB Bundle
    needs: build
    runs-on: macos-latest
    outputs:
      mcpb_sha256: ${{ steps.sha256.outputs.hash }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: binaries
          merge-multiple: false

      - name: Assemble MCPB bundle
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VERSION_NUM="${VERSION#v}"
          export VERSION_NUM
          
          # Create mcpb directory structure
          mkdir -p mcpb-bundle/server/linux
          mkdir -p mcpb-bundle/server/darwin
          mkdir -p mcpb-bundle/server/win32
          
          # Copy Linux binaries
          if [ -d "binaries/binaries-linux-amd64" ]; then
            cp binaries/binaries-linux-amd64/mpm-go mcpb-bundle/server/linux/
            cp binaries/binaries-linux-amd64/ast_indexer mcpb-bundle/server/linux/
            chmod +x mcpb-bundle/server/linux/*
          fi
          
          # Build macOS universal binaries (amd64 + arm64)
          if [ -d "binaries/binaries-darwin-amd64" ] && [ -d "binaries/binaries-darwin-arm64" ]; then
            lipo -create \
              -output mcpb-bundle/server/darwin/mpm-go \
              binaries/binaries-darwin-amd64/mpm-go \
              binaries/binaries-darwin-arm64/mpm-go

            lipo -create \
              -output mcpb-bundle/server/darwin/ast_indexer \
              binaries/binaries-darwin-amd64/ast_indexer \
              binaries/binaries-darwin-arm64/ast_indexer

            chmod +x mcpb-bundle/server/darwin/*
          fi
          
          # Copy Windows binaries
          if [ -d "binaries/binaries-windows-amd64" ]; then
            cp binaries/binaries-windows-amd64/mpm-go.exe mcpb-bundle/server/win32/
            cp binaries/binaries-windows-amd64/ast_indexer.exe mcpb-bundle/server/win32/
          fi
          
          # Generate manifest.json from template
          python3 - << 'PY'
          import json, os

          version = os.environ.get('VERSION_NUM', '').strip() or '0.0.0'

          with open('mcpb/manifest.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          data['version'] = version

          with open('mcpb-bundle/manifest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          PY
          
          # Create .mcpb file (zip format)
          cd mcpb-bundle
          zip -r ../mpm-vibe-coding-${VERSION}.mcpb .
          cd ..
          
          echo "MCPB_FILE=mpm-vibe-coding-${VERSION}.mcpb" >> $GITHUB_ENV

      - name: Calculate SHA256
        id: sha256
        run: |
          HASH=$(shasum -a 256 "${{ env.MCPB_FILE }}" | cut -d' ' -f1)
          echo "hash=${HASH}" >> $GITHUB_OUTPUT
          echo "MCPB_SHA256=${HASH}" >> $GITHUB_ENV
          echo "SHA256: ${HASH}"

      - name: Generate server.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VERSION_NUM="${VERSION#v}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          DOWNLOAD_URL="${REPO_URL}/releases/download/${VERSION}/mpm-vibe-coding-${VERSION}.mcpb"
          SERVER_NAME="${{ vars.MCP_SERVER_NAME }}"
          if [ -z "${SERVER_NAME}" ]; then
            SERVER_NAME="io.github.halflifezyf2680/mpm-vibe-coding"
          fi
          
          cat > server.json << SERVERJSON_EOF
          {
            "\$schema": "https://static.modelcontextprotocol.io/schemas/2025-12-11/server.schema.json",
            "name": "${SERVER_NAME}",
            "title": "MPM",
            "description": "Local MCP server for engineering workflows: AST-based code navigation, impact/flow analysis, task orchestration, and memo/recall memory.",
            "version": "${VERSION_NUM}",
            "packages": [
              {
                "registryType": "mcpb",
                "identifier": "${DOWNLOAD_URL}",
                "fileSha256": "${{ env.MCPB_SHA256 }}",
                "transport": {
                  "type": "stdio"
                }
              }
            ],
            "repository": {
              "url": "${REPO_URL}",
              "source": "github"
            },
            "websiteUrl": "${REPO_URL}"
          }
          SERVERJSON_EOF
          
          cat server.json

      - name: Upload MCPB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpb-bundle
          path: |
            ${{ env.MCPB_FILE }}
            server.json
          retention-days: 1

  release:
    name: Create Release
    needs: [build, build-mcpb]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy platform packages
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          # Copy mcpb bundle
          cp artifacts/mcpb-bundle/*.mcpb release-assets/ || true
          cp artifacts/mcpb-bundle/server.json release-assets/ || true
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: MPM ${{ steps.version.outputs.VERSION }}
          body: |
            ## MPM - Vibe Coding MCP
            
            ### Downloads
            
            | Platform | File |
            |------|------|
            | Windows x64 | `mpm-windows-amd64.zip` |
            | Linux x64 | `mpm-linux-amd64.tar.gz` |
            | macOS Intel | `mpm-darwin-amd64.tar.gz` |
            | macOS Apple Silicon | `mpm-darwin-arm64.tar.gz` |
            | MCP Registry bundle | `mpm-vibe-coding-${{ steps.version.outputs.VERSION }}.mcpb` |
            
            ### Usage
            
            1. Download the package for your platform
            2. Extract to any directory
            3. Point your MCP client to the `mpm-go` executable
            
            ### Registry metadata
            
            This release also includes:
            - `server.json` (MCP Registry metadata)
          draft: false
          prerelease: false
          files: release-assets/*
