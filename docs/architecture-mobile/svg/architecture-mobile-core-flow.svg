<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">MPM-Coding 核心链路子图</title>
  <desc id="desc">展示 initialize_project 到 memo 的核心执行链路，以及每一步的真实文件和验收产物。</desc>
  <defs>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#111827"/>
    </marker>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:52px;font-weight:800;fill:#0B1220}
      .sub{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:25px;font-weight:700;fill:#344054}
      .step{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:30px;font-weight:800;fill:#101828}
      .text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:22px;font-weight:650;fill:#344054}
      .note{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:18px;font-weight:600;fill:#475467}
      .box{stroke:#111827;stroke-width:4;rx:26;ry:26}
      .arrow{stroke:#111827;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#F5FCFF"/>
  <rect x="38" y="38" width="1004" height="1844" rx="36" fill="#FFFFFF" stroke="#111827" stroke-width="5"/>
  <text class="title" x="78" y="124">核心链路：从初始化到交付记录</text>
  <text class="sub" x="80" y="168">每一步都有明确输入、后台动作和可验收输出</text>

  <rect x="78" y="230" width="924" height="170" class="box" fill="#E0F2FE"/>
  <text class="step" x="118" y="284">1. initialize_project：建立项目锚点</text>
  <text class="text" x="118" y="328">创建 .mpm-data、project_config.json、mcp_memory.db，异步启动 AST 索引</text>
  <text class="note" x="118" y="364">真实文件：system_tools.go / database.go / ast_indexer.go</text>

  <path class="arrow" d="M540 404 L540 462"/>

  <rect x="78" y="476" width="924" height="192" class="box" fill="#D1FAE5"/>
  <text class="step" x="118" y="530">2. project_map / code_search：收敛注意力</text>
  <text class="text" x="118" y="574">先看目录和符号，再定位函数、类、方法；避免 AI 靠文件名猜测</text>
  <text class="text" x="118" y="610">查询结果包含文件、行号、签名、调用和候选</text>
  <text class="note" x="118" y="646">真实文件：search_tools.go / map_renderer.go</text>

  <path class="arrow" d="M540 672 L540 730"/>

  <rect x="78" y="744" width="924" height="214" class="box" fill="#FEF3C7"/>
  <text class="step" x="118" y="798">3. flow_trace：读懂业务主链</text>
  <text class="text" x="118" y="842">从符号或文件生成上游、下游、关键路径、阶段摘要</text>
  <text class="text" x="118" y="878">适合陌生模块，不靠“打开几个文件碰碰运气”</text>
  <text class="note" x="118" y="918">真实函数：wrapFlowTrace / buildFlowSnapshot / detectStages</text>

  <path class="arrow" d="M540 962 L540 1020"/>

  <rect x="78" y="1034" width="924" height="214" class="box" fill="#FECACA"/>
  <text class="step" x="118" y="1088">4. code_impact：改前风险评估</text>
  <text class="text" x="118" y="1132">按 backward、forward 或 both 分析调用传播范围</text>
  <text class="text" x="118" y="1168">输出风险等级、复杂度、影响节点和修改检查清单</text>
  <text class="note" x="118" y="1208">真实文件：analysis_tools.go 调用 ASTIndexer.Analyze</text>

  <path class="arrow" d="M540 1252 L540 1310"/>

  <rect x="78" y="1324" width="924" height="214" class="box" fill="#DDD6FE"/>
  <text class="step" x="118" y="1378">5. task_chain / system_hook：执行可续传</text>
  <text class="text" x="118" y="1422">阶段类型包含 execute、gate、loop；状态可 start、complete、resume</text>
  <text class="text" x="118" y="1458">阻塞事项用 hook 挂起，条件满足后 release 闭合</text>
  <text class="note" x="118" y="1498">真实文件：task_tools.go / task_chain_v3.go / task_chain_v3_api.go</text>

  <path class="arrow" d="M540 1542 L540 1600"/>

  <rect x="78" y="1614" width="924" height="172" class="box" fill="#BFDBFE"/>
  <text class="step" x="118" y="1668">6. memo：交付前写入原因</text>
  <text class="text" x="118" y="1712">记录分类、实体、行为、路径和“为什么这么改”</text>
  <text class="note" x="118" y="1748">验收：SQLite 有记录，dev-log.md 可读，archive 可恢复</text>

  <text class="note" x="84" y="1842">主链价值：定位清楚、影响清楚、执行有状态、结果可追溯。</text>
</svg>
