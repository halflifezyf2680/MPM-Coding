<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">MPM-Coding 后台机制子图</title>
  <desc id="desc">展示 Go 服务、Rust AST 索引器、SQLite 数据库和后台索引状态的协作机制。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#155EEF"/>
    </marker>
    <marker id="arrowRed" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#C01048"/>
    </marker>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:52px;font-weight:800;fill:#111827}
      .sub{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:25px;font-weight:700;fill:#344054}
      .h{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:30px;font-weight:800;fill:#101828}
      .t{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:22px;font-weight:650;fill:#344054}
      .s{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:18px;font-weight:600;fill:#475467}
      .box{stroke:#111827;stroke-width:4;rx:26;ry:26}
      .arrow{stroke:#155EEF;stroke-width:6;fill:none;marker-end:url(#arrowBlue)}
      .arrowRed{stroke:#C01048;stroke-width:6;fill:none;marker-end:url(#arrowRed)}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#FFFBFF"/>
  <rect x="38" y="38" width="1004" height="1844" rx="36" fill="#FFFFFF" stroke="#111827" stroke-width="5"/>
  <text class="title" x="78" y="124">后台机制：索引、查询、记忆三层协作</text>
  <text class="sub" x="80" y="168">Go 负责 MCP 协议和工具编排，Rust 负责 AST 解析，SQLite 负责持久化</text>

  <rect x="88" y="230" width="904" height="160" class="box" fill="#DBEAFE"/>
  <text class="h" x="128" y="284">Go MCP 服务</text>
  <text class="t" x="128" y="328">入口 main.go：DetectProjectRoot 后绑定 MemoryLayer 与 ASTIndexer</text>
  <text class="s" x="128" y="362">ServeStdio 接收客户端调用，工具 handler 校验参数并组织结果</text>

  <path class="arrow" d="M540 394 L540 452"/>

  <rect x="88" y="466" width="904" height="228" class="box" fill="#D1FAE5"/>
  <text class="h" x="128" y="520">Rust AST 索引器</text>
  <text class="t" x="128" y="564">ast_indexer：支持 index、structure、map、query、analyze 模式</text>
  <text class="t" x="128" y="600">Tree-sitter 解析 Go、Rust、Python、TS/JS、Java、C/C++、HTML、CSS</text>
  <text class="s" x="128" y="640">设计依据：ast_indexer_rust/README.md，静态链接、零运行时依赖</text>

  <path class="arrow" d="M540 698 L292 780"/>
  <path class="arrow" d="M540 698 L540 780"/>
  <path class="arrow" d="M540 698 L788 780"/>

  <rect x="76" y="794" width="288" height="214" class="box" fill="#FEF3C7"/>
  <text class="h" x="112" y="846">结构扫描</text>
  <text class="t" x="112" y="890">structure 模式</text>
  <text class="s" x="112" y="930">快速目录统计</text>
  <text class="s" x="112" y="962">project_map(level=structure)</text>

  <rect x="396" y="794" width="288" height="214" class="box" fill="#A7F3D0"/>
  <text class="h" x="432" y="846">符号查询</text>
  <text class="t" x="432" y="890">query / map 模式</text>
  <text class="s" x="432" y="930">函数、类、签名、候选</text>
  <text class="s" x="432" y="962">code_search 与 project_map</text>

  <rect x="716" y="794" width="288" height="214" class="box" fill="#FECACA"/>
  <text class="h" x="752" y="846">影响分析</text>
  <text class="t" x="752" y="890">analyze 模式</text>
  <text class="s" x="752" y="930">调用图传播</text>
  <text class="s" x="752" y="962">code_impact 与 flow_trace</text>

  <path class="arrowRed" d="M220 1012 C220 1090 340 1114 440 1138"/>
  <path class="arrowRed" d="M540 1012 L540 1130"/>
  <path class="arrowRed" d="M860 1012 C860 1090 740 1114 640 1138"/>

  <rect x="156" y="1152" width="768" height="230" class="box" fill="#EEF4FF"/>
  <text class="h" x="196" y="1206">symbols.db：代码结构事实库</text>
  <text class="t" x="196" y="1250">files、symbols、calls 保存源文件、符号节点和 调用方 → 被调用方 边</text>
  <text class="t" x="196" y="1286">warmIndexForPath 与 EnsureFreshIndex 避免使用过期索引</text>
  <text class="s" x="196" y="1326">位置：.mpm-data/symbols.db</text>

  <path class="arrow" d="M540 1386 L540 1444"/>

  <rect x="88" y="1458" width="904" height="214" class="box" fill="#EDE9FE"/>
  <text class="h" x="128" y="1512">mcp_memory.db：工作过程事实库</text>
  <text class="t" x="128" y="1556">memos、tasks、known_facts、system_state、pending_hooks、task_chains</text>
  <text class="t" x="128" y="1592">DatabaseManager 启用 WAL、busy_timeout、schema 自愈和迁移</text>
  <text class="s" x="128" y="1632">位置：.mpm-data/mcp_memory.db</text>

  <rect x="88" y="1724" width="904" height="112" rx="24" fill="#F0FDF4" stroke="#111827" stroke-width="4"/>
  <text class="h" x="128" y="1778">验收方式</text>
  <text class="t" x="128" y="1816">index_status 读取 index_status.json、heartbeat 与数据库大小，确认后台索引可用</text>
</svg>
