<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">MPM-Coding 用户能力子图</title>
  <desc id="desc">展示用户在 MPM-Coding 中获得的定位、分析、执行、记忆和增强能力。</desc>
  <defs>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#0B5FFF"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#111827" flood-opacity="0.15"/>
    </filter>
    <style>
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:52px;font-weight:800;fill:#111827}
      .sub{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:26px;font-weight:700;fill:#344054}
      .h{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:31px;font-weight:800;fill:#101828}
      .t{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:23px;font-weight:650;fill:#344054}
      .s{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:19px;font-weight:600;fill:#475467}
      .card{stroke:#111827;stroke-width:4;rx:28;ry:28;filter:url(#shadow)}
      .arrow{stroke:#0B5FFF;stroke-width:6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#FFFDF7"/>
  <rect x="38" y="38" width="1004" height="1844" rx="36" fill="#FFFFFF" stroke="#111827" stroke-width="5"/>
  <text class="title" x="78" y="124">用户视角：少猜，能收口</text>
  <text class="sub" x="80" y="168">MPM 的功能价值不是“工具多”，而是把 AI 的注意力收敛到可交付路径</text>

  <rect x="86" y="232" width="908" height="126" rx="28" fill="#DBEAFE" stroke="#111827" stroke-width="4"/>
  <text class="h" x="126" y="282">用户提交任务</text>
  <text class="t" x="126" y="322">例如：修复崩溃、开发功能、重构模块、复盘历史决策</text>

  <path class="arrow" d="M540 360 L540 418"/>

  <rect x="86" y="432" width="908" height="184" class="card" fill="#D1FAE5"/>
  <text class="h" x="126" y="486">一、定位能力：知道该看哪里</text>
  <text class="t" x="126" y="530">project_map 先给目录和符号地图，code_search 精确返回函数或类的位置</text>
  <text class="s" x="126" y="570">真实实现：search_tools.go 调 AST 查询；无 AST 匹配时回退 ripgrep</text>

  <path class="arrow" d="M540 620 L540 678"/>

  <rect x="86" y="692" width="908" height="184" class="card" fill="#FEF3C7"/>
  <text class="h" x="126" y="746">二、理解能力：按主链阅读</text>
  <text class="t" x="126" y="790">flow_trace 从入口符号或文件出发，展示上下游、关键路径和阶段摘要</text>
  <text class="s" x="126" y="830">真实实现：analysis_tools.go 组合 Analyze 结果与调用关系快照</text>

  <path class="arrow" d="M540 880 L540 938"/>

  <rect x="86" y="952" width="908" height="184" class="card" fill="#FECACA"/>
  <text class="h" x="126" y="1006">三、安全能力：动手前看爆炸半径</text>
  <text class="t" x="126" y="1050">code_impact 输出风险等级、复杂度、直接和间接调用者</text>
  <text class="s" x="126" y="1090">真实实现：AST 调用图 BFS 分析，结果提醒“修改前必须检查”</text>

  <path class="arrow" d="M540 1140 L540 1198"/>

  <rect x="86" y="1212" width="908" height="214" class="card" fill="#DDD6FE"/>
  <text class="h" x="126" y="1266">四、执行能力：长任务有检查点</text>
  <text class="t" x="126" y="1310">task_chain 把任务拆为阶段、门控和循环子任务；system_hook 处理阻塞</text>
  <text class="s" x="126" y="1350">真实实现：task_chain_v3.go 定义 pending、active、passed、failed 等状态</text>
  <text class="s" x="126" y="1382">用户价值：会话中断可 resume，gate 失败可重试，不靠脑内记进度</text>

  <path class="arrow" d="M540 1430 L540 1488"/>

  <rect x="86" y="1502" width="908" height="190" class="card" fill="#BFDBFE"/>
  <text class="h" x="126" y="1556">五、记忆能力：知道为什么这样改</text>
  <text class="t" x="126" y="1600">memo 写入 mcp_memory.db，同步 dev-log.md，并追加归档恢复源</text>
  <text class="s" x="126" y="1640">system_recall 与 known_facts 支持后续检索，open_timeline 可视化演进</text>

  <rect x="86" y="1718" width="908" height="130" rx="24" fill="#F0FDF4" stroke="#111827" stroke-width="4"/>
  <text class="h" x="126" y="1768">验收方式</text>
  <text class="t" x="126" y="1810">任务结果必须能定位、能解释影响、能恢复进度</text>
  <text class="t" x="126" y="1838">并且能查到“为什么这么改”的记录</text>
</svg>
