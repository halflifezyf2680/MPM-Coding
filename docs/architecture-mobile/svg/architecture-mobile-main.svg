<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">MPM-Coding 手机竖屏主架构图</title>
  <desc id="desc">展示 MPM-Coding 从用户指令到 MCP 工具、AST 索引、SQLite 记忆和验收闭环的真实项目架构。</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#155EEF"/>
    </marker>
    <marker id="arrowDark" markerWidth="24" markerHeight="24" refX="20" refY="12" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L22,12 L2,22 Z" fill="#111827"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg{fill:#F8FBFF}
      .title{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:54px;font-weight:800;fill:#0B1220}
      .subtitle{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:26px;font-weight:600;fill:#344054}
      .label{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:25px;font-weight:800;fill:#101828}
      .small{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:21px;font-weight:600;fill:#344054}
      .tiny{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;font-size:16px;font-weight:600;fill:#475467}
      .white{fill:#FFFFFF}
      .stroke{stroke:#111827;stroke-width:4}
      .dash{stroke:#667085;stroke-width:4;stroke-dasharray:10 10;fill:none}
      .arrow{stroke:#155EEF;stroke-width:6;fill:none;marker-end:url(#arrowBlue)}
      .arrowDark{stroke:#111827;stroke-width:5;fill:none;marker-end:url(#arrowDark)}
      .pill{rx:20;ry:20;stroke:#111827;stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="1080" height="1920"/>
  <rect x="38" y="38" width="1004" height="1844" rx="36" fill="#FFFFFF" stroke="#111827" stroke-width="5"/>

  <text class="title" x="82" y="120">MPM-Coding 总架构</text>
  <text class="subtitle" x="84" y="164">把 AI 编程从“能演示”推进到“能交付”的工具闭环</text>

  <rect x="72" y="210" width="936" height="134" rx="28" fill="#E0F2FE" class="stroke" filter="url(#softShadow)"/>
  <text class="label" x="108" y="258">用户视角的价值</text>
  <text class="small" x="108" y="296">少猜文件、少读噪声、改前知风险、长任务可续传、改后能追溯原因</text>
  <text class="tiny" x="108" y="326">真实入口：README.md 与 docs/MANUAL.md 定义的“定位 → 分析 → 执行 → 记录”</text>

  <rect x="102" y="410" width="876" height="116" rx="26" fill="#FEF3C7" class="stroke"/>
  <text class="label" x="138" y="456">AI 客户端 / 用户指令</text>
  <text class="small" x="138" y="494">通过 MCP StdIO 调用工具，不直接猜代码位置</text>

  <path class="arrow" d="M540 528 C540 560 540 575 540 604"/>

  <rect x="92" y="610" width="896" height="220" rx="28" fill="#DBEAFE" class="stroke" filter="url(#softShadow)"/>
  <text class="label" x="128" y="660">Go 主服务</text>
  <text class="small" x="128" y="700">mcp-server-go/cmd/server/main.go 入口</text>
  <text class="small" x="128" y="740">初始化 SessionManager / ASTIndexer / MemoryLayer</text>
  <text class="small" x="128" y="780">注册七组工具后 ServeStdio 对外服务</text>

  <path class="arrow" d="M540 834 C540 868 540 882 540 912"/>

  <rect x="72" y="920" width="936" height="344" rx="32" fill="#FFFFFF" stroke="#111827" stroke-width="5"/>
  <text class="label" x="108" y="968">MCP 工具层：面向"交付"的能力入口</text>
  <g>
    <rect x="108" y="1004" width="260" height="92" class="pill" fill="#A7F3D0"/>
    <text class="small" x="126" y="1040">导航</text>
    <text class="tiny" x="126" y="1070">code_search/project_map</text>
  </g>
  <g>
    <rect x="410" y="1004" width="260" height="92" class="pill" fill="#FDE68A"/>
    <text class="small" x="428" y="1040">主链阅读</text>
    <text class="tiny" x="428" y="1070">flow_trace</text>
  </g>
  <g>
    <rect x="712" y="1004" width="260" height="92" class="pill" fill="#FECACA"/>
    <text class="small" x="730" y="1040">安全分析</text>
    <text class="tiny" x="730" y="1070">code_impact</text>
  </g>
  <g>
    <rect x="108" y="1126" width="260" height="92" class="pill" fill="#C4B5FD"/>
    <text class="small" x="126" y="1162">长任务执行</text>
    <text class="tiny" x="126" y="1192">task_chain/system_hook</text>
  </g>
  <g>
    <rect x="410" y="1126" width="260" height="92" class="pill" fill="#BFDBFE"/>
    <text class="small" x="428" y="1162">记忆追溯</text>
    <text class="tiny" x="428" y="1192">memo/system_recall</text>
  </g>
  <g>
    <rect x="712" y="1126" width="260" height="92" class="pill" fill="#FDA4AF"/>
    <text class="small" x="730" y="1162">体验增强</text>
    <text class="tiny" x="730" y="1192">persona/open_timeline</text>
  </g>

  <path class="arrow" d="M276 1266 C234 1310 218 1346 218 1392"/>
  <path class="arrow" d="M540 1266 C540 1312 540 1350 540 1392"/>
  <path class="arrow" d="M804 1266 C846 1310 862 1346 862 1392"/>

  <rect x="72" y="1402" width="290" height="240" rx="30" fill="#ECFDF3" class="stroke" filter="url(#softShadow)"/>
  <text class="label" x="108" y="1454">AST 索引库</text>
  <text class="small" x="108" y="1494">Rust + Tree-sitter</text>
  <text class="tiny" x="108" y="1532">多语言解析</text>
  <text class="tiny" x="108" y="1564">符号、签名、调用边</text>
  <text class="tiny" x="108" y="1596">写入 symbols.db</text>

  <rect x="396" y="1402" width="290" height="240" rx="30" fill="#EEF4FF" class="stroke" filter="url(#softShadow)"/>
  <text class="label" x="432" y="1454">记忆层 SSOT</text>
  <text class="small" x="432" y="1494">SQLite + WAL</text>
  <text class="tiny" x="432" y="1532">mcp_memory.db</text>
  <text class="tiny" x="432" y="1564">memos / tasks / hooks</text>
  <text class="tiny" x="432" y="1596">dev-log 与归档恢复</text>

  <rect x="720" y="1402" width="290" height="240" rx="30" fill="#FFF1F3" class="stroke" filter="url(#softShadow)"/>
  <text class="label" x="756" y="1454">验收出口</text>
  <text class="small" x="756" y="1494">可恢复、可审计</text>
  <text class="tiny" x="756" y="1532">index_status 看进度</text>
  <text class="tiny" x="756" y="1564">gate 阶段判定通过</text>
  <text class="tiny" x="756" y="1596">memo 记录为什么改</text>

  <path class="arrowDark" d="M362 1522 L396 1522"/>
  <path class="arrowDark" d="M686 1522 L720 1522"/>

  <rect x="72" y="1702" width="936" height="164" rx="28" fill="#F0FDF4" class="stroke"/>
  <text class="label" x="108" y="1752">核心链路</text>
  <text class="tiny" x="108" y="1792">initialize_project → code_search / project_map</text>
  <text class="tiny" x="108" y="1818">→ flow_trace / code_impact → task_chain → memo</text>
  <text class="tiny" x="108" y="1844">后台机制：索引异步构建，查询前预热，数据库自愈，任务链状态持久化</text>
</svg>
